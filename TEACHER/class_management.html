<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Learning DC — Class Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Playfair+Display:wght@700;800&display=swap"
      rel="stylesheet"
    />

    <script>
      (function () {
        const t = localStorage.getItem("sl-theme") || "light";
        document.documentElement.setAttribute("data-theme", t);
      })();
    </script>

    <style>
      /* ── TOKENS ─────────────────────────────────────────── */
      :root {
        --bg: #eef2ff;
        --surface: #ffffff;
        --surf2: #f3f5ff;
        --surf3: #e8ecff;
        --text: #0f1f3d;
        --muted: #5a6e8c;
        --border: rgba(15, 31, 61, 0.09);
        --primary: #5b63f5;
        --pri-soft: rgba(91, 99, 245, 0.12);
        --pri-glow: rgba(91, 99, 245, 0.2);
        --accent: #7c3aed;
        --success: #22c55e;
        --warning: #f59e0b;
        --danger: #ef4444;
        --radius: 20px;
        --shadow: 0 4px 20px rgba(15, 31, 61, 0.08);
        --shadow-lg: 0 16px 50px rgba(15, 31, 61, 0.12);
        --font: "DM Sans", sans-serif;
        --font-d: "Playfair Display", serif;
      }
      [data-theme="dark"] {
        --bg: #07101e;
        --surface: #0d1628;
        --surf2: #111f36;
        --surf3: #162440;
        --text: #e2e8f0;
        --muted: #7a92b4;
        --border: rgba(148, 163, 184, 0.12);
        --primary: #818cf8;
        --pri-soft: rgba(129, 140, 248, 0.13);
        --pri-glow: rgba(129, 140, 248, 0.22);
        --accent: #a78bfa;
        --success: #4ade80;
        --warning: #fbbf24;
        --danger: #f87171;
        --shadow: 0 4px 20px rgba(0, 0, 0, 0.35);
        --shadow-lg: 0 16px 50px rgba(0, 0, 0, 0.45);
      }

      /* ── RESET ──────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        font-size: 16px;
      }
      body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        transition:
          background 200ms,
          color 200ms;
      }
      a {
        text-decoration: none;
        color: inherit;
      }
      button {
        font-family: inherit;
        cursor: pointer;
        border: none;
        background: none;
      }
      input,
      select,
      textarea {
        font-family: inherit;
      }

      /* ── NAVBAR ─────────────────────────────────────────── */
      .navbar {
        position: sticky;
        top: 0;
        z-index: 50;
        height: 68px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 0 24px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        box-shadow: var(--shadow);
      }
      .nav-left {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .nav-right {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 9px;
        font-weight: 700;
        font-size: 1rem;
      }
      .brand-mark {
        width: 32px;
        height: 32px;
        border-radius: 9px;
        background: var(--primary);
        display: grid;
        place-items: center;
      }
      .brand-mark svg {
        width: 15px;
        height: 15px;
        fill: none;
        stroke: #fff;
        stroke-width: 2;
        stroke-linecap: round;
      }

      .btn-back {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 8px 16px;
        border-radius: 999px;
        background: var(--surf2);
        border: 1px solid var(--border);
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--text);
        transition:
          background 160ms,
          border-color 160ms;
      }
      .btn-back:hover {
        background: var(--surf3);
        border-color: var(--primary);
      }

      .btn-icon {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: var(--surf2);
        border: 1px solid var(--border);
        display: grid;
        place-items: center;
        font-size: 1rem;
        transition:
          background 160ms,
          transform 200ms;
      }
      .btn-icon:hover {
        background: var(--surf3);
      }
      #themeBtn:hover {
        transform: rotate(20deg);
      }

      .profile-pill {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 5px 13px 5px 5px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--surf2);
      }
      .avatar {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: var(--primary);
        color: #fff;
        display: grid;
        place-items: center;
        font-weight: 700;
        font-size: 0.88rem;
        flex-shrink: 0;
      }
      .p-name {
        font-weight: 700;
        font-size: 0.86rem;
      }
      .p-role {
        color: var(--muted);
        font-size: 0.75rem;
      }

      /* ── PAGE ────────────────────────────────────────────── */
      .page {
        max-width: 1300px;
        margin: 0 auto;
        padding: 28px 20px 60px;
      }

      /* ── PAGE HEADER ─────────────────────────────────────── */
      .page-head {
        margin-bottom: 28px;
      }
      .page-eyebrow {
        font-size: 0.73rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.09em;
        color: var(--muted);
        margin-bottom: 8px;
      }
      .page-title {
        font-family: var(--font-d);
        font-size: clamp(1.6rem, 3vw, 2.4rem);
        font-weight: 800;
        line-height: 1.1;
      }
      .page-sub {
        color: var(--muted);
        font-size: 0.93rem;
        line-height: 1.7;
        font-weight: 300;
        margin-top: 8px;
        max-width: 600px;
      }

      /* Stats summary row */
      .summary-row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 20px;
      }
      .sum-chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 16px;
        border-radius: 999px;
        background: var(--surface);
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
        font-size: 0.85rem;
        font-weight: 600;
      }
      .sum-chip .val {
        font-size: 1.1rem;
        font-weight: 800;
        color: var(--primary);
      }

      /* ── CARDS GRID ──────────────────────────────────────── */
      .cards-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
        margin-top: 24px;
      }

      .class-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 24px;
        display: grid;
        gap: 18px;
        transition:
          transform 180ms,
          box-shadow 180ms,
          border-color 180ms;
      }
      .class-card:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-lg);
        border-color: var(--primary);
      }

      .card-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .grade-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 16px;
        border-radius: 999px;
        background: var(--pri-soft);
        color: var(--primary);
        font-weight: 800;
        font-size: 0.9rem;
      }
      .grade-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--primary);
      }
      .student-count {
        display: flex;
        align-items: center;
        gap: 5px;
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 600;
      }
      .sc-num {
        color: var(--text);
        font-weight: 800;
        font-size: 1rem;
      }

      .subjects-row {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }
      .subj-tag {
        padding: 5px 11px;
        border-radius: 999px;
        background: var(--surf2);
        border: 1px solid var(--border);
        font-size: 0.78rem;
        font-weight: 600;
        color: var(--text);
      }
      .subj-tag.more {
        color: var(--primary);
        background: var(--pri-soft);
        border-color: transparent;
      }

      /* Progress bar */
      .att-bar-wrap {
        display: grid;
        gap: 5px;
      }
      .att-bar-label {
        display: flex;
        justify-content: space-between;
        font-size: 0.78rem;
        color: var(--muted);
        font-weight: 600;
      }
      .att-bar {
        height: 6px;
        border-radius: 999px;
        background: var(--border);
        overflow: hidden;
      }
      .att-fill {
        height: 100%;
        border-radius: 999px;
        background: var(--success);
        transition: width 600ms ease;
      }

      /* Card actions */
      .card-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 9px;
      }
      .btn-primary {
        padding: 11px 14px;
        border-radius: 13px;
        background: var(--primary);
        color: #fff;
        font-size: 0.84rem;
        font-weight: 700;
        box-shadow: 0 4px 14px var(--pri-glow);
        transition:
          opacity 160ms,
          transform 130ms;
      }
      .btn-primary:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }
      .btn-secondary {
        padding: 10px 14px;
        border-radius: 13px;
        background: var(--surf2);
        color: var(--text);
        font-size: 0.84rem;
        font-weight: 700;
        border: 1px solid var(--border);
        transition:
          background 160ms,
          border-color 160ms;
      }
      .btn-secondary:hover {
        background: var(--surf3);
        border-color: var(--primary);
      }
      .btn-full {
        grid-column: 1 / -1;
      }
      .btn-sm {
        padding: 8px 13px;
        border-radius: 10px;
        font-size: 0.78rem;
        font-weight: 700;
      }
      .btn-danger {
        color: var(--danger);
        border: 1px solid rgba(239, 68, 68, 0.25);
        background: rgba(239, 68, 68, 0.07);
      }
      .btn-danger:hover {
        background: rgba(239, 68, 68, 0.14);
      }
      .btn-success-sm {
        color: var(--success);
        border: 1px solid rgba(34, 197, 94, 0.25);
        background: rgba(34, 197, 94, 0.07);
      }

      /* ── MODAL ───────────────────────────────────────────── */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(7, 16, 30, 0.72);
        backdrop-filter: blur(5px);
        display: grid;
        place-items: center;
        padding: 20px;
        z-index: 100;
        opacity: 0;
        pointer-events: none;
        transition: opacity 200ms;
      }
      .modal-overlay.open {
        opacity: 1;
        pointer-events: all;
      }

      .modal {
        background: var(--surface);
        border-radius: 22px;
        box-shadow: var(--shadow-lg);
        width: min(680px, 100%);
        border: 1px solid var(--border);
        transform: translateY(14px) scale(0.98);
        transition: transform 200ms;
        max-height: calc(100vh - 60px);
        overflow-y: auto;
        position: relative;
      }
      .modal-overlay.open .modal {
        transform: translateY(0) scale(1);
      }

      .modal-head {
        padding: 24px 24px 18px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
        position: sticky;
        top: 0;
        background: var(--surface);
        z-index: 2;
      }
      .modal-eyebrow {
        font-size: 0.72rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.09em;
        color: var(--muted);
        margin-bottom: 5px;
      }
      .modal-title {
        font-family: var(--font-d);
        font-size: 1.5rem;
        font-weight: 800;
      }
      .modal-close {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: var(--surf2);
        border: 1px solid var(--border);
        display: grid;
        place-items: center;
        color: var(--muted);
        font-size: 1rem;
        transition: background 160ms;
        flex-shrink: 0;
      }
      .modal-close:hover {
        background: var(--surf3);
        color: var(--text);
      }

      .modal-body {
        padding: 20px 24px 24px;
        display: grid;
        gap: 12px;
      }

      /* Search bar */
      .modal-search {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 11px 14px;
        border-radius: 13px;
        background: var(--surf2);
        border: 1.5px solid var(--border);
        transition:
          border-color 160ms,
          box-shadow 160ms;
      }
      .modal-search:focus-within {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px var(--pri-glow);
      }
      .modal-search input {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        font-size: 0.9rem;
        color: var(--text);
      }
      .modal-search input::placeholder {
        color: var(--muted);
        opacity: 0.6;
      }

      /* Student cards */
      .student-card {
        display: grid;
        gap: 10px;
        padding: 16px 18px;
        border-radius: 16px;
        background: var(--surf2);
        border: 1px solid var(--border);
        transition: border-color 160ms;
      }
      .student-card:hover {
        border-color: var(--primary);
      }
      .student-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
      }
      .student-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: var(--pri-soft);
        color: var(--primary);
        display: grid;
        place-items: center;
        font-weight: 800;
        font-size: 1rem;
        flex-shrink: 0;
      }
      .student-info {
        flex: 1;
      }
      .student-name {
        font-weight: 700;
        font-size: 0.95rem;
      }
      .student-roll {
        color: var(--muted);
        font-size: 0.8rem;
        margin-top: 1px;
      }
      .student-grade-pill {
        padding: 4px 12px;
        border-radius: 999px;
        background: var(--pri-soft);
        color: var(--primary);
        font-size: 0.78rem;
        font-weight: 700;
      }
      .student-progress {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .prog-bar {
        flex: 1;
        height: 5px;
        border-radius: 999px;
        background: var(--border);
        overflow: hidden;
      }
      .prog-fill {
        height: 100%;
        border-radius: 999px;
        background: var(--primary);
      }
      .prog-pct {
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--muted);
        flex-shrink: 0;
      }

      /* Attendance row */
      .att-row-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .att-chip {
        padding: 5px 12px;
        border-radius: 999px;
        font-size: 0.75rem;
        font-weight: 700;
        border: 1.5px solid var(--border);
        cursor: pointer;
        transition:
          background 160ms,
          border-color 160ms,
          color 160ms;
        background: var(--surface);
        color: var(--muted);
      }
      .att-chip.present {
        background: rgba(34, 197, 94, 0.12);
        border-color: rgba(34, 197, 94, 0.4);
        color: var(--success);
      }
      .att-chip.absent {
        background: rgba(239, 68, 68, 0.1);
        border-color: rgba(239, 68, 68, 0.35);
        color: var(--danger);
      }

      /* Add student form */
      .add-student-form {
        display: grid;
        gap: 10px;
        padding: 16px;
        border: 1.5px dashed var(--border);
        border-radius: 14px;
        background: var(--surf2);
      }
      .add-student-form .form-title {
        font-weight: 700;
        font-size: 0.9rem;
      }
      .add-student-form .field-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .add-student-form input {
        width: 100%;
        padding: 11px 13px;
        border-radius: 12px;
        border: 1.5px solid var(--border);
        background: var(--surface);
        color: var(--text);
        font-size: 0.88rem;
        outline: none;
        transition:
          border-color 160ms,
          box-shadow 160ms;
      }
      .add-student-form input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px var(--pri-glow);
      }
      .add-student-form input::placeholder {
        color: var(--muted);
        opacity: 0.6;
      }
      .form-actions-row {
        display: flex;
        gap: 9px;
      }

      /* Content upload section inside modal */
      .content-section {
        display: grid;
        gap: 10px;
      }
      .content-section .sec-title {
        font-weight: 700;
        font-size: 0.88rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.07em;
      }
      .content-type-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 8px;
      }
      .content-type-btn {
        padding: 12px 10px;
        border-radius: 13px;
        border: 1.5px solid var(--border);
        background: var(--surf2);
        color: var(--text);
        font-size: 0.8rem;
        font-weight: 700;
        text-align: center;
        transition:
          background 160ms,
          border-color 160ms,
          color 160ms;
      }
      .content-type-btn:hover {
        border-color: var(--primary);
        background: var(--pri-soft);
        color: var(--primary);
      }

      /* Tab bar */
      .tab-bar {
        display: flex;
        gap: 6px;
        padding-bottom: 2px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 14px;
      }
      .tab {
        padding: 9px 16px;
        border-radius: 10px 10px 0 0;
        font-size: 0.85rem;
        font-weight: 700;
        color: var(--muted);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition:
          color 160ms,
          border-color 160ms;
      }
      .tab.active {
        color: var(--primary);
        border-bottom-color: var(--primary);
      }

      /* Empty state */
      .empty {
        padding: 28px;
        text-align: center;
        color: var(--muted);
        font-size: 0.88rem;
        background: var(--surf2);
        border: 1px solid var(--border);
        border-radius: 14px;
        line-height: 1.7;
      }

      /* Toast */
      .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        padding: 12px 18px;
        border-radius: 13px;
        background: var(--text);
        color: var(--surface);
        font-size: 0.84rem;
        font-weight: 600;
        box-shadow: var(--shadow-lg);
        opacity: 0;
        transform: translateY(8px);
        transition:
          opacity 200ms,
          transform 200ms;
        z-index: 200;
        pointer-events: none;
        max-width: 280px;
      }
      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      /* Status */
      .status-msg {
        font-size: 0.82rem;
        min-height: 16px;
      }
      .status-msg.error {
        color: var(--danger);
      }
      .status-msg.success {
        color: var(--success);
      }

      /* Responsive */
      @media (max-width: 720px) {
        .navbar {
          padding: 0 14px;
        }
        .page {
          padding: 18px 12px 48px;
        }
        .cards-grid {
          grid-template-columns: 1fr;
        }
        .add-student-form .field-row {
          grid-template-columns: 1fr;
        }
        .p-name,
        .p-role {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <!-- ── NAVBAR ──────────────────────────────────────────── -->
    <nav class="navbar">
      <div class="nav-left">
        <a href="teacher_dashboard.html" class="brand">
          <div class="brand-mark">
            <svg viewBox="0 0 24 24">
              <path d="M12 2L2 7l10 5 10-5-10-5z" />
              <path d="M2 17l10 5 10-5" />
              <path d="M2 12l10 5 10-5" />
            </svg>
          </div>
          Smart Learning DC
        </a>
        <a href="teacher_dashboard.html" class="btn-back">← Dashboard</a>
      </div>
      <div class="nav-right">
        <button class="btn-icon" id="themeBtn" aria-label="Toggle theme">
          🌙
        </button>
        <div class="profile-pill">
          <div class="avatar" id="avatarEl">T</div>
          <div>
            <div class="p-name" id="profileNameEl">Teacher</div>
            <div class="p-role">Faculty</div>
          </div>
        </div>
      </div>
    </nav>

    <!-- ── PAGE ────────────────────────────────────────────── -->
    <div class="page">
      <div class="page-head">
        <div class="page-eyebrow">Teacher Console</div>
        <h1 class="page-title" id="pageTitle">Class Management</h1>
        <p class="page-sub" id="pageSub">
          Manage your assigned classes — view students, track attendance, and
          upload subject content.
        </p>
        <div class="summary-row" id="summaryRow"></div>
      </div>

      <div class="cards-grid" id="cardsGrid"></div>
    </div>

    <!-- ── MODAL ───────────────────────────────────────────── -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal" id="modal">
        <div class="modal-head">
          <div>
            <div class="modal-eyebrow" id="modalEyebrow">Class</div>
            <div class="modal-title" id="modalTitle">Students</div>
          </div>
          <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
      </div>
    </div>

    <!-- ── TOAST ───────────────────────────────────────────── -->
    <div class="toast" id="toast"></div>

    <script>
      /* ═══════════════════════════════════════════════════════════
   SMART LEARNING DC — class_management.html
   Fully dynamic. Reads teacher profile + learner data from
   localStorage. No Supabase needed.
   ═══════════════════════════════════════════════════════════ */

      /* ── 1. SUBJECT MAP ────────────────────────────────────── */
      const SUBJECTS_BY_GRADE = {
        5: [
          "Mathematics",
          "English",
          "Science",
          "Social Studies",
          "Hindi",
          "Computer",
        ],
        6: [
          "Mathematics",
          "English",
          "Science",
          "Social Studies",
          "Hindi",
          "Computer",
        ],
        7: [
          "Mathematics",
          "English",
          "Science",
          "Social Studies",
          "Hindi",
          "Sanskrit",
        ],
        8: [
          "Mathematics",
          "English",
          "Science",
          "Social Studies",
          "Hindi",
          "Sanskrit",
        ],
        9: [
          "Mathematics",
          "English",
          "Science",
          "Social Science",
          "Hindi",
          "IT",
        ],
        10: [
          "Mathematics",
          "English",
          "Science",
          "Social Science",
          "Hindi",
          "IT",
        ],
        PCM: ["Physics", "Chemistry", "Mathematics", "English", "Physical Ed."],
        PCB: ["Physics", "Chemistry", "Biology", "English", "Physical Ed."],
        Commerce: [
          "Accountancy",
          "Business Studies",
          "Economics",
          "English",
          "Mathematics",
        ],
        Arts: [
          "History",
          "Geography",
          "Political Science",
          "English",
          "Sociology",
        ],
      };

      const SUBJECT_ICONS = {
        Mathematics: "➗",
        English: "📖",
        Science: "🔬",
        Physics: "⚡",
        Chemistry: "⚗️",
        Biology: "🧬",
        Hindi: "🅱️",
        History: "🏛️",
        Geography: "🗺️",
        Accountancy: "📊",
        Economics: "📈",
        IT: "💻",
        Computer: "💻",
        "Physical Ed.": "🏃",
        Sanskrit: "📜",
        "Social Studies": "🌍",
        "Social Science": "🌏",
        "Business Studies": "💼",
        "Political Science": "⚖️",
        Sociology: "👥",
        default: "📚",
      };

      /* ── 2. STORAGE ────────────────────────────────────────── */
      const PROFILE_KEY = "teacherProfile";
      const LEARNERS_KEY = "learnerProfile"; // single learner (from registration)
      const STUDENTS_KEY = "cm_students"; // managed students per grade
      const ATTENDANCE_KEY = "cm_attendance";
      const TC_CONTENT_KEY = "tc_content";

      function getProfile() {
        try {
          return JSON.parse(localStorage.getItem(PROFILE_KEY) || "{}");
        } catch {
          return {};
        }
      }
      function getStudents() {
        try {
          return JSON.parse(localStorage.getItem(STUDENTS_KEY) || "{}");
        } catch {
          return {};
        }
      }
      function saveStudents(d) {
        localStorage.setItem(STUDENTS_KEY, JSON.stringify(d));
      }
      function getAttendance() {
        try {
          return JSON.parse(localStorage.getItem(ATTENDANCE_KEY) || "{}");
        } catch {
          return {};
        }
      }
      function saveAttendance(d) {
        localStorage.setItem(ATTENDANCE_KEY, JSON.stringify(d));
      }
      function getContent() {
        try {
          return JSON.parse(localStorage.getItem(TC_CONTENT_KEY) || "[]");
        } catch {
          return [];
        }
      }
      function todayKey() {
        return new Date().toISOString().split("T")[0];
      }

      /* ── 3. LOAD PROFILE ───────────────────────────────────── */
      let profile = {};
      let assignment = {};

      function loadProfile() {
        profile = getProfile();
        if (!profile.fullName && !profile.email) {
          window.location.href = "teacher_login.html";
          return false;
        }
        assignment = profile.teachingAssignment || {};
        const name = (profile.fullName || "Teacher").trim();
        document.getElementById("profileNameEl").textContent = name;
        document.getElementById("avatarEl").textContent = name
          .charAt(0)
          .toUpperCase();

        // Also pull registered learner into students if not already there
        tryImportLearner();
        return true;
      }

      // If a learner registered, import them into the student list for their grade
      function tryImportLearner() {
        const lp = (() => {
          try {
            return JSON.parse(localStorage.getItem(LEARNERS_KEY) || "null");
          } catch {
            return null;
          }
        })();
        if (!lp || !lp.grade) return;
        const students = getStudents();
        const grade = String(lp.grade);
        students[grade] = students[grade] || [];
        const exists = students[grade].some((s) => s.email === lp.email);
        if (!exists && lp.fullName) {
          students[grade].push({
            id: "lp_" + Date.now(),
            name: lp.fullName,
            email: lp.email || "",
            roll: String(students[grade].length + 1).padStart(2, "0"),
            grade,
            progress: Math.floor(Math.random() * 60) + 20,
          });
          saveStudents(students);
        }
      }

      /* ── 4. GET ASSIGNED GRADES ────────────────────────────── */
      function getAssignedGrades() {
        const mode = assignment.mode || "teachAll";
        if (mode === "teachAll") {
          const g = assignment.grade || assignment.gradeGroup || "9-10";
          const parts = String(g).split("-");
          if (parts.length === 2) {
            const res = [];
            for (let i = Number(parts[0]); i <= Number(parts[1]); i++)
              res.push(String(i));
            return res;
          }
          return [String(g)];
        }
        const classMap = assignment.classMap || {};
        return [...new Set(Object.values(classMap).flat().map(String))];
      }

      function getSubjectsForGrade(grade) {
        const mode = assignment.mode || "teachAll";
        if (mode === "specialist") {
          const classMap = assignment.classMap || {};
          return (assignment.subjects || []).filter((s) => {
            const classes = (classMap[s] || []).map(String);
            return classes.includes(String(grade));
          });
        }
        const g = String(grade);
        if (Number(g) === 11 || Number(g) === 12) {
          return (
            SUBJECTS_BY_GRADE[assignment.stream || "PCM"] ||
            SUBJECTS_BY_GRADE["PCM"]
          );
        }
        return SUBJECTS_BY_GRADE[g] || ["Mathematics", "English", "Science"];
      }

      /* ── 5. THEME ──────────────────────────────────────────── */
      const themeBtn = document.getElementById("themeBtn");
      function getTheme() {
        return localStorage.getItem("sl-theme") || "light";
      }
      function applyTheme(t) {
        document.documentElement.setAttribute("data-theme", t);
        themeBtn.textContent = t === "dark" ? "☀️" : "🌙";
        localStorage.setItem("sl-theme", t);
      }
      themeBtn.addEventListener("click", () =>
        applyTheme(getTheme() === "dark" ? "light" : "dark"),
      );

      /* ── 6. TOAST ──────────────────────────────────────────── */
      const toastEl = document.getElementById("toast");
      let toastTimer;
      function showToast(msg) {
        toastEl.textContent = msg;
        toastEl.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toastEl.classList.remove("show"), 2500);
      }

      /* ── 7. ATTENDANCE HELPERS ─────────────────────────────── */
      function getAttendancePct(grade) {
        const att = getAttendance();
        const today = todayKey();
        const gradeAtt = att[grade] && att[grade][today];
        if (!gradeAtt) return null;
        const students = getStudents()[grade] || [];
        if (!students.length) return null;
        const present = students.filter(
          (s) => gradeAtt[s.id] === "present",
        ).length;
        return Math.round((present / students.length) * 100);
      }

      /* ── 8. RENDER SUMMARY CHIPS ───────────────────────────── */
      function renderSummary() {
        const grades = getAssignedGrades();
        const students = getStudents();
        const totalStudents = grades.reduce(
          (sum, g) => sum + (students[g] || []).length,
          0,
        );
        const totalSubjects = [
          ...new Set(grades.flatMap((g) => getSubjectsForGrade(g))),
        ].length;
        const myContent = getContent().filter(
          (c) => c.staffId === profile.staffId,
        ).length;

        document.getElementById("summaryRow").innerHTML = `
    <span class="sum-chip"><span class="val">${grades.length}</span> Classes assigned</span>
    <span class="sum-chip"><span class="val">${totalStudents}</span> Total students</span>
    <span class="sum-chip"><span class="val">${totalSubjects}</span> Subjects</span>
    <span class="sum-chip"><span class="val">${myContent}</span> Content items</span>
  `;
      }

      /* ── 9. RENDER CLASS CARDS ─────────────────────────────── */
      function renderCards() {
        const grades = getAssignedGrades();
        const grid = document.getElementById("cardsGrid");

        if (!grades.length) {
          grid.innerHTML = `<div class="empty" style="grid-column:1/-1;">No grades assigned to your profile yet.<br>Please complete your registration on the teacher login page.</div>`;
          return;
        }

        const all_students = getStudents();

        grid.innerHTML = grades
          .map((grade) => {
            const subjects = getSubjectsForGrade(grade);
            const students = all_students[grade] || [];
            const attPct = getAttendancePct(grade);
            const myContent = getContent().filter(
              (c) => c.staffId === profile.staffId && c.grade === grade,
            );

            const subjectTags = subjects
              .slice(0, 5)
              .map(
                (s) =>
                  `<span class="subj-tag">${SUBJECT_ICONS[s] || "📚"} ${s}</span>`,
              )
              .join("");
            const moreTags =
              subjects.length > 5
                ? `<span class="subj-tag more">+${subjects.length - 5} more</span>`
                : "";

            const attBar =
              attPct !== null
                ? `
      <div class="att-bar-wrap">
        <div class="att-bar-label"><span>Today's attendance</span><span style="color:${attPct >= 80 ? "var(--success)" : "var(--warning)"}">${attPct}%</span></div>
        <div class="att-bar"><div class="att-fill" style="width:${attPct}%"></div></div>
      </div>`
                : `<div style="color:var(--muted);font-size:0.8rem;">Attendance not marked today yet</div>`;

            return `
      <div class="class-card">
        <div class="card-head">
          <div class="grade-badge"><span class="grade-dot"></span>Class ${grade}</div>
          <div class="student-count"><span class="sc-num">${students.length}</span>&nbsp;students</div>
        </div>

        <div class="subjects-row">${subjectTags}${moreTags}</div>

        ${attBar}

        <div style="font-size:0.78rem;color:var(--muted);">${myContent.length} content item${myContent.length !== 1 ? "s" : ""} uploaded for this class</div>

        <div class="card-actions">
          <button class="btn-primary" onclick="openStudentsModal('${grade}')">👥 View Students</button>
          <button class="btn-secondary" onclick="openAttendanceModal('${grade}')">📋 Attendance</button>
          <button class="btn-secondary btn-full" onclick="openContentModal('${grade}')">📤 Manage Content for Class ${grade}</button>
        </div>
      </div>`;
          })
          .join("");
      }

      /* ── 10. MODAL HELPERS ─────────────────────────────────── */
      function openModal() {
        document.getElementById("modalOverlay").classList.add("open");
      }
      function closeModal() {
        document.getElementById("modalOverlay").classList.remove("open");
      }

      document.getElementById("modalOverlay").addEventListener("click", (e) => {
        if (e.target === document.getElementById("modalOverlay")) closeModal();
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeModal();
      });

      function setModal(eyebrow, title, bodyHTML) {
        document.getElementById("modalEyebrow").textContent = eyebrow;
        document.getElementById("modalTitle").textContent = title;
        document.getElementById("modalBody").innerHTML = bodyHTML;
        openModal();
      }

      /* ── 11. STUDENTS MODAL ────────────────────────────────── */
      let currentGrade = null;
      let currentTab = "students";

      function openStudentsModal(grade) {
        currentGrade = grade;
        currentTab = "students";
        renderStudentsModal(grade);
      }

      window.openStudentsModal = openStudentsModal;

      function renderStudentsModal(grade, search = "") {
        const students = (getStudents()[grade] || []).filter(
          (s) =>
            !search ||
            s.name.toLowerCase().includes(search.toLowerCase()) ||
            s.roll.includes(search),
        );

        document.getElementById("modalEyebrow").textContent =
          `Class ${grade} Management`;
        document.getElementById("modalTitle").textContent =
          `Class ${grade} Students`;

        const attData =
          (getAttendance()[grade] && getAttendance()[grade][todayKey()]) || {};

        const studentCards = students.length
          ? students
              .map((s) => {
                const initials = s.name
                  .split(" ")
                  .map((w) => w[0])
                  .slice(0, 2)
                  .join("")
                  .toUpperCase();
                const attStatus = attData[s.id] || "none";
                const prog = s.progress || 0;
                return `
      <div class="student-card">
        <div class="student-top">
          <div style="display:flex;align-items:center;gap:10px;">
            <div class="student-avatar">${initials}</div>
            <div class="student-info">
              <div class="student-name">${s.name}</div>
              <div class="student-roll">Roll: ${s.roll} ${s.email ? "• " + s.email : ""}</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="student-grade-pill">Grade ${grade}</span>
            <button class="btn-sm btn-danger" onclick="removeStudent('${grade}','${s.id}')">✕</button>
          </div>
        </div>
        <div class="student-progress">
          <div class="prog-bar"><div class="prog-fill" style="width:${prog}%"></div></div>
          <div class="prog-pct">${prog}% progress</div>
        </div>
        <div class="att-row-actions">
          <span style="font-size:0.78rem;color:var(--muted);font-weight:600;">Attendance:</span>
          <button class="att-chip ${attStatus === "present" ? "present" : ""}" onclick="markAtt('${grade}','${s.id}','present')">✓ Present</button>
          <button class="att-chip ${attStatus === "absent" ? "absent" : ""}" onclick="markAtt('${grade}','${s.id}','absent')">✗ Absent</button>
        </div>
      </div>`;
              })
              .join("")
          : `<div class="empty">No students in Class ${grade} yet.<br>Use the form below to add students.</div>`;

        const html = `
    <div class="tab-bar">
      <div class="tab active" onclick="openStudentsModal('${grade}')">👥 Students (${students.length})</div>
      <div class="tab" onclick="openAttendanceModal('${grade}')">📋 Attendance</div>
      <div class="tab" onclick="openContentModal('${grade}')">📤 Content</div>
    </div>

    <div class="modal-search">
      <span>🔍</span>
      <input type="text" id="studentSearch" placeholder="Search by name or roll…" oninput="renderStudentsModal('${grade}', this.value)" value="${search}" />
    </div>

    ${studentCards}

    <!-- Add student form -->
    <div class="add-student-form">
      <div class="form-title">➕ Add Student to Class ${grade}</div>
      <div class="field-row">
        <input type="text" id="addName"  placeholder="Full name" />
        <input type="text" id="addEmail" placeholder="Email (optional)" />
      </div>
      <p class="status-msg" id="addStatus"></p>
      <div class="form-actions-row">
        <button class="btn-primary btn-sm" onclick="addStudent('${grade}')">Add Student</button>
        <button class="btn-secondary btn-sm" onclick="addDemoStudents('${grade}')">Add demo students</button>
      </div>
    </div>
  `;

        document.getElementById("modalEyebrow").textContent =
          `Class ${grade} Management`;
        document.getElementById("modalTitle").textContent =
          `Class ${grade} Students`;
        document.getElementById("modalBody").innerHTML = html;
        openModal();
      }

      window.renderStudentsModal = renderStudentsModal;

      window.addStudent = (grade) => {
        const name = document.getElementById("addName").value.trim();
        const email = document.getElementById("addEmail").value.trim();
        const statusEl = document.getElementById("addStatus");

        if (!name) {
          statusEl.textContent = "Please enter a student name.";
          statusEl.className = "status-msg error";
          return;
        }

        const students = getStudents();
        students[grade] = students[grade] || [];

        const exists = students[grade].some(
          (s) => s.name.toLowerCase() === name.toLowerCase(),
        );
        if (exists) {
          statusEl.textContent = "A student with that name already exists.";
          statusEl.className = "status-msg error";
          return;
        }

        students[grade].push({
          id: "st_" + Date.now(),
          name,
          email,
          roll: String(students[grade].length + 1).padStart(2, "0"),
          grade,
          progress: Math.floor(Math.random() * 50) + 10,
        });
        saveStudents(students);
        showToast(`${name} added to Class ${grade}`);
        renderCards();
        renderSummary();
        renderStudentsModal(grade);
      };

      window.addDemoStudents = (grade) => {
        const demoNames = [
          "Ananya Kapoor",
          "Rohan Singh",
          "Meera Patel",
          "Arjun Das",
          "Priya Nair",
          "Vivaan Iyer",
          "Simran Kaur",
          "Kabir Shah",
        ];
        const students = getStudents();
        students[grade] = students[grade] || [];
        let added = 0;
        demoNames.forEach((name) => {
          if (!students[grade].some((s) => s.name === name)) {
            students[grade].push({
              id: "dm_" + Date.now() + "_" + added,
              name,
              email: "",
              roll: String(students[grade].length + 1).padStart(2, "0"),
              grade,
              progress: Math.floor(Math.random() * 70) + 20,
            });
            added++;
          }
        });
        saveStudents(students);
        showToast(`${added} demo students added to Class ${grade}`);
        renderCards();
        renderSummary();
        renderStudentsModal(grade);
      };

      window.removeStudent = (grade, id) => {
        const students = getStudents();
        students[grade] = (students[grade] || []).filter((s) => s.id !== id);
        saveStudents(students);
        showToast("Student removed");
        renderCards();
        renderSummary();
        renderStudentsModal(grade);
      };

      window.markAtt = (grade, studentId, status) => {
        const att = getAttendance();
        att[grade] = att[grade] || {};
        att[grade][todayKey()] = att[grade][todayKey()] || {};
        att[grade][todayKey()][studentId] = status;
        saveAttendance(att);
        showToast(`Marked ${status}`);
        renderCards();
        renderStudentsModal(
          grade,
          document.getElementById("studentSearch")?.value || "",
        );
      };

      /* ── 12. ATTENDANCE MODAL ──────────────────────────────── */
      function openAttendanceModal(grade) {
        currentGrade = grade;
        const students = getStudents()[grade] || [];
        const attData = getAttendance()[grade] || {};
        const today = todayKey();

        const days = [];
        for (let i = 6; i >= 0; i--) {
          const d = new Date();
          d.setDate(d.getDate() - i);
          days.push(d.toISOString().split("T")[0]);
        }

        const tableRows = students
          .map((s) => {
            const cells = days
              .map((day) => {
                const a = attData[day] && attData[day][s.id];
                const color =
                  a === "present"
                    ? "var(--success)"
                    : a === "absent"
                      ? "var(--danger)"
                      : "var(--border)";
                const label =
                  a === "present" ? "✓" : a === "absent" ? "✗" : "—";
                return `<td style="text-align:center;padding:10px 6px;color:${color};font-weight:700;font-size:0.85rem;">${label}</td>`;
              })
              .join("");
            const presentCount = days.filter(
              (d) => attData[d] && attData[d][s.id] === "present",
            ).length;
            const pct = Math.round((presentCount / days.length) * 100);
            return `<tr style="border-bottom:1px solid var(--border);">
      <td style="padding:10px 8px;font-weight:600;font-size:0.87rem;">${s.name}</td>
      ${cells}
      <td style="text-align:center;padding:10px 6px;font-weight:800;color:${pct >= 80 ? "var(--success)" : "var(--warning)"};">${pct}%</td>
    </tr>`;
          })
          .join("");

        const dayLabels = days
          .map((d) => {
            const dt = new Date(d);
            const isToday = d === today;
            return `<th style="text-align:center;padding:8px 6px;font-size:0.75rem;color:${isToday ? "var(--primary)" : "var(--muted)"};font-weight:700;">${isToday ? "Today" : dt.toLocaleDateString([], { weekday: "short" })}</th>`;
          })
          .join("");

        const html = `
    <div class="tab-bar">
      <div class="tab" onclick="openStudentsModal('${grade}')">👥 Students</div>
      <div class="tab active">📋 Attendance</div>
      <div class="tab" onclick="openContentModal('${grade}')">📤 Content</div>
    </div>

    ${
      !students.length
        ? `<div class="empty">No students in Class ${grade} yet. Add students first.</div>`
        : `
      <div style="overflow-x:auto;">
        <table style="width:100%;border-collapse:collapse;min-width:500px;">
          <thead>
            <tr style="border-bottom:2px solid var(--border);">
              <th style="text-align:left;padding:8px;font-size:0.8rem;color:var(--muted);">Student</th>
              ${dayLabels}
              <th style="text-align:center;padding:8px 6px;font-size:0.75rem;color:var(--muted);">7-Day %</th>
            </tr>
          </thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>

      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:12px 0 4px;">
        <span style="font-size:0.83rem;color:var(--muted);">Mark all today:</span>
        <button class="btn-primary btn-sm" onclick="markAllToday('${grade}','present')">✓ All Present</button>
        <button class="btn-secondary btn-sm" onclick="markAllToday('${grade}','absent')">✗ All Absent</button>
      </div>
    `
    }
  `;

        document.getElementById("modalEyebrow").textContent = `Class ${grade}`;
        document.getElementById("modalTitle").textContent = "Attendance Record";
        document.getElementById("modalBody").innerHTML = html;
        openModal();
      }

      window.openAttendanceModal = openAttendanceModal;

      window.markAllToday = (grade, status) => {
        const students = getStudents()[grade] || [];
        const att = getAttendance();
        att[grade] = att[grade] || {};
        att[grade][todayKey()] = att[grade][todayKey()] || {};
        students.forEach((s) => {
          att[grade][todayKey()][s.id] = status;
        });
        saveAttendance(att);
        showToast(`All students marked ${status} for today`);
        renderCards();
        openAttendanceModal(grade);
      };

      /* ── 13. CONTENT MODAL ─────────────────────────────────── */
      function openContentModal(grade) {
        currentGrade = grade;
        const subjects = getSubjectsForGrade(grade);
        const myContent = getContent().filter(
          (c) => c.staffId === profile.staffId && c.grade === grade,
        );

        const contentBySubject = {};
        subjects.forEach((s) => {
          contentBySubject[s] = myContent.filter((c) => c.subject === s);
        });

        const TYPE_ICONS = {
          video: "▶️",
          pdf: "📄",
          image: "🖼️",
          quiz: "🎯",
          live: "📅",
        };

        const rows = subjects
          .map((s) => {
            const items = contentBySubject[s] || [];
            const itemHtml = items.length
              ? items
                  .map(
                    (c) => `
          <div style="display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--surface);border:1px solid var(--border);border-radius:11px;margin-top:7px;">
            <span>${TYPE_ICONS[c.type] || "📁"}</span>
            <div style="flex:1;min-width:0;">
              <div style="font-size:0.84rem;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${c.title || "Untitled"}</div>
              <div style="font-size:0.75rem;color:var(--muted);">${c.type.toUpperCase()} • ${c.chapter || "—"} • ${new Date(c.ts).toLocaleDateString()}</div>
            </div>
          </div>`,
                  )
                  .join("")
              : `<div style="font-size:0.8rem;color:var(--muted);padding:6px 0;">No content yet.</div>`;

            const icon = SUBJECT_ICONS[s] || SUBJECT_ICONS.default;
            return `
      <div style="background:var(--surf2);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px;">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;">
          <div style="display:flex;align-items:center;gap:9px;">
            <span style="font-size:1.2rem;">${icon}</span>
            <div style="font-weight:700;font-size:0.92rem;">${s}</div>
            <span style="padding:3px 9px;border-radius:999px;background:var(--pri-soft);color:var(--primary);font-size:0.73rem;font-weight:700;">${items.length} item${items.length !== 1 ? "s" : ""}</span>
          </div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;">
            <button class="btn-primary btn-sm" onclick="quickUpload('${grade}','${s}','video')">▶ Video</button>
            <button class="btn-secondary btn-sm" onclick="quickUpload('${grade}','${s}','pdf')">📄 Notes</button>
            <button class="btn-secondary btn-sm" onclick="quickUpload('${grade}','${s}','quiz')">🎯 Quiz</button>
          </div>
        </div>
        ${itemHtml}
      </div>`;
          })
          .join("");

        const html = `
    <div class="tab-bar">
      <div class="tab" onclick="openStudentsModal('${grade}')">👥 Students</div>
      <div class="tab" onclick="openAttendanceModal('${grade}')">📋 Attendance</div>
      <div class="tab active">📤 Content</div>
    </div>
    <div style="color:var(--muted);font-size:0.83rem;margin-bottom:10px;">Upload resources per subject. Students see them in their subject resource pages.</div>
    ${rows}
  `;

        document.getElementById("modalEyebrow").textContent = `Class ${grade}`;
        document.getElementById("modalTitle").textContent = "Subject Content";
        document.getElementById("modalBody").innerHTML = html;
        openModal();
      }

      window.openContentModal = openContentModal;

      window.quickUpload = (grade, subject, type) => {
        closeModal();
        const title = prompt(
          `Enter title for ${type.toUpperCase()} — ${subject} (Class ${grade}):`,
        );
        if (!title || !title.trim()) {
          showToast("Upload cancelled — no title entered");
          return;
        }
        const chapter = prompt("Chapter or topic name:") || "General";

        const content = getContent();
        content.unshift({
          id: "cm_" + Date.now() + "_" + Math.random().toString(36).slice(2),
          staffId: profile.staffId || "unknown",
          type,
          subject,
          grade,
          chapter,
          title: title.trim(),
          desc: "",
          file: null,
          ts: new Date().toISOString(),
        });
        localStorage.setItem(TC_CONTENT_KEY, JSON.stringify(content));

        const dl = JSON.parse(localStorage.getItem("tc_daily_uploads") || "{}");
        dl[todayKey()] = (dl[todayKey()] || 0) + 1;
        localStorage.setItem("tc_daily_uploads", JSON.stringify(dl));

        showToast(`${title} uploaded for ${subject} Grade ${grade}`);
        renderCards();
        renderSummary();
        openContentModal(grade);
      };

      /* ── 14. INIT ──────────────────────────────────────────── */
      document.addEventListener("DOMContentLoaded", () => {
        if (!loadProfile()) return;
        applyTheme(getTheme());

        const grades = getAssignedGrades();
        const name = (profile.fullName || "Teacher").split(" ")[0];
        document.getElementById("pageTitle").textContent = `Class Management`;
        document.getElementById("pageSub").textContent =
          `Managing ${grades.length} class${grades.length !== 1 ? "es" : ""} — ${name}'s dashboard. View students, mark attendance, and upload content per subject.`;

        renderSummary();
        renderCards();
      });
    </script>
  </body>
</html>
