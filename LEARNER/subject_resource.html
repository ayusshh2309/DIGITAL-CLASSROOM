<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Learning DC — Subject Resource</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Playfair+Display:wght@700;800&display=swap"
      rel="stylesheet"
    />

    <script>
      (function () {
        const t = localStorage.getItem("sl-theme") || "light";
        document.documentElement.setAttribute("data-theme", t);
      })();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="../js/supabase-client.js"></script>

    <style>
      /* ── TOKENS ─────────────────────────────────────────── */
      :root {
        --bg: #f0f4fb;
        --surface: #ffffff;
        --surf2: #f5f8ff;
        --surf3: #edf2ff;
        --text: #0f172a;
        --muted: #64748b;
        --border: rgba(15, 23, 42, 0.08);
        --primary: #6366f1;
        --pri-soft: rgba(99, 102, 241, 0.12);
        --pri-glow: rgba(99, 102, 241, 0.2);
        --success: #22c55e;
        --warning: #f59e0b;
        --danger: #ef4444;
        --radius: 22px;
        --shadow: 0 4px 24px rgba(15, 23, 42, 0.08);
        --shadow-lg: 0 20px 60px rgba(15, 23, 42, 0.1);
        --font: "DM Sans", sans-serif;
        --font-d: "Playfair Display", serif;
      }
      [data-theme="dark"] {
        --bg: #07101f;
        --surface: #0d1a2e;
        --surf2: #111f35;
        --surf3: #162540;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --border: rgba(148, 163, 184, 0.12);
        --primary: #818cf8;
        --pri-soft: rgba(129, 140, 248, 0.14);
        --pri-glow: rgba(129, 140, 248, 0.22);
        --success: #4ade80;
        --warning: #fbbf24;
        --danger: #f87171;
        --shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
        --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.45);
      }

      /* ── RESET ──────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        font-size: 16px;
      }
      body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        transition:
          background 200ms,
          color 200ms;
      }
      a {
        text-decoration: none;
        color: inherit;
      }
      button {
        font-family: inherit;
        cursor: pointer;
        border: none;
        background: none;
      }

      /* ── NAVBAR ─────────────────────────────────────────── */
      .navbar {
        position: sticky;
        top: 0;
        z-index: 50;
        height: 68px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 0 28px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        box-shadow: var(--shadow);
      }
      .nav-left {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .nav-right {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 9px;
        font-weight: 700;
        font-size: 1rem;
        letter-spacing: -0.01em;
      }
      .brand-mark {
        width: 32px;
        height: 32px;
        border-radius: 9px;
        background: var(--primary);
        display: grid;
        place-items: center;
      }
      .brand-mark svg {
        width: 16px;
        height: 16px;
        fill: none;
        stroke: #fff;
        stroke-width: 2;
        stroke-linecap: round;
      }

      .btn-back {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        border-radius: 999px;
        background: var(--surf2);
        border: 1px solid var(--border);
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--text);
        transition:
          background 180ms,
          border-color 180ms;
      }
      .btn-back:hover {
        background: var(--surf3);
        border-color: var(--primary);
      }

      .btn-icon {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: var(--surf2);
        border: 1px solid var(--border);
        display: grid;
        place-items: center;
        font-size: 1rem;
        transition:
          background 180ms,
          transform 200ms;
      }
      .btn-icon:hover {
        background: var(--surf3);
      }
      #themeBtn:hover {
        transform: rotate(20deg);
      }

      .subject-badge {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 7px 14px;
        border-radius: 999px;
        background: var(--pri-soft);
        color: var(--primary);
        font-size: 0.82rem;
        font-weight: 700;
      }
      .subject-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--primary);
      }

      /* ── PAGE ────────────────────────────────────────────── */
      .page {
        max-width: 1100px;
        margin: 0 auto;
        padding: 28px 24px 60px;
        display: grid;
        gap: 24px;
      }

      /* ── HERO ────────────────────────────────────────────── */
      .hero-card {
        background:
          linear-gradient(135deg, var(--pri-soft), transparent 60%),
          var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 32px;
        display: grid;
        gap: 16px;
      }
      .hero-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
      }
      .hero-title {
        font-family: var(--font-d);
        font-size: clamp(1.6rem, 3vw, 2.4rem);
        font-weight: 800;
        line-height: 1.1;
        letter-spacing: -0.02em;
        margin-top: 8px;
      }
      .hero-sub {
        color: var(--muted);
        font-size: 0.97rem;
        line-height: 1.75;
        font-weight: 300;
      }

      /* Action tabs */
      .action-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .tab-btn {
        padding: 9px 18px;
        border-radius: 999px;
        font-size: 0.875rem;
        font-weight: 700;
        border: 1.5px solid var(--border);
        background: var(--surf2);
        color: var(--muted);
        transition:
          background 180ms,
          border-color 180ms,
          color 180ms,
          transform 130ms;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .tab-btn:hover {
        background: var(--surf3);
        border-color: var(--primary);
        color: var(--text);
      }
      .tab-btn.active {
        background: var(--primary);
        border-color: var(--primary);
        color: #fff;
        box-shadow: 0 4px 14px var(--pri-glow);
        transform: translateY(-1px);
      }

      /* ── CONTENT AREA ────────────────────────────────────── */
      .content-area {
        display: grid;
        gap: 18px;
      }

      /* ── CARD BASE ───────────────────────────────────────── */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 26px;
      }
      .card-title {
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin-bottom: 6px;
      }
      .card-heading {
        font-family: var(--font-d);
        font-size: clamp(1.1rem, 1.6vw, 1.4rem);
        font-weight: 800;
        line-height: 1.15;
        margin-bottom: 18px;
      }

      /* ── RESOURCE GRID ───────────────────────────────────── */
      .res-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 16px;
      }
      .res-card {
        background: var(--surf2);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        transition:
          transform 180ms,
          border-color 180ms,
          box-shadow 180ms;
      }
      .res-card:hover {
        transform: translateY(-2px);
        border-color: var(--primary);
        box-shadow: 0 10px 28px var(--pri-glow);
      }

      .res-icon {
        width: 46px;
        height: 46px;
        border-radius: 13px;
        background: var(--pri-soft);
        display: grid;
        place-items: center;
        font-size: 1.3rem;
        flex-shrink: 0;
      }
      .res-name {
        font-weight: 700;
        font-size: 0.97rem;
      }
      .res-desc {
        color: var(--muted);
        font-size: 0.85rem;
        line-height: 1.55;
        font-weight: 300;
        flex: 1;
      }
      .res-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .res-tag {
        padding: 4px 10px;
        border-radius: 999px;
        background: var(--pri-soft);
        color: var(--primary);
        font-size: 0.75rem;
        font-weight: 700;
      }
      .res-tag.green {
        background: rgba(34, 197, 94, 0.12);
        color: var(--success);
      }
      .res-tag.amber {
        background: rgba(245, 158, 11, 0.12);
        color: var(--warning);
      }

      .btn-res {
        width: 100%;
        padding: 11px;
        border-radius: 12px;
        background: var(--primary);
        color: #fff;
        font-size: 0.875rem;
        font-weight: 700;
        box-shadow: 0 4px 14px var(--pri-glow);
        transition:
          opacity 180ms,
          transform 140ms;
      }
      .btn-res:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }
      .btn-res.done {
        background: var(--success);
        box-shadow: none;
      }
      .btn-res.secondary {
        background: transparent;
        color: var(--primary);
        border: 1.5px solid rgba(99, 102, 241, 0.3);
        box-shadow: none;
      }
      .btn-res.secondary:hover {
        background: var(--pri-soft);
      }

      /* ── VIDEO PLAYER MOCK ───────────────────────────────── */
      .video-player {
        width: 100%;
        aspect-ratio: 16/9;
        border-radius: 16px;
        background: var(--surf3);
        border: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        position: relative;
        overflow: hidden;
        cursor: pointer;
        transition: box-shadow 180ms;
      }
      .video-player:hover {
        box-shadow: 0 12px 32px var(--pri-glow);
      }
      .video-player::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, var(--pri-soft), transparent 60%);
      }
      .play-btn {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: var(--primary);
        display: grid;
        place-items: center;
        box-shadow: 0 8px 24px var(--pri-glow);
        position: relative;
        z-index: 1;
        transition:
          transform 200ms,
          box-shadow 200ms;
      }
      .video-player:hover .play-btn {
        transform: scale(1.1);
        box-shadow: 0 12px 32px var(--pri-glow);
      }
      .play-btn svg {
        width: 28px;
        height: 28px;
        fill: #fff;
        margin-left: 4px;
      }
      .video-duration {
        position: absolute;
        bottom: 14px;
        right: 16px;
        z-index: 1;
        background: rgba(15, 23, 42, 0.75);
        color: #fff;
        padding: 4px 10px;
        border-radius: 8px;
        font-size: 0.8rem;
        font-weight: 700;
      }
      .video-title {
        position: relative;
        z-index: 1;
        font-weight: 700;
        font-size: 1rem;
        color: var(--text);
        text-align: center;
        padding: 0 24px;
      }

      /* ── NOTES ───────────────────────────────────────────── */
      .notes-content {
        background: var(--surf2);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 24px;
        line-height: 1.8;
        font-size: 0.95rem;
        color: var(--text);
      }
      .notes-content h3 {
        font-size: 1.05rem;
        font-weight: 700;
        margin: 18px 0 8px;
        color: var(--primary);
      }
      .notes-content h3:first-child {
        margin-top: 0;
      }
      .notes-content p {
        color: var(--muted);
        margin-bottom: 12px;
        font-weight: 300;
      }
      .notes-content ul {
        padding-left: 20px;
        color: var(--muted);
        margin-bottom: 12px;
      }
      .notes-content li {
        margin-bottom: 6px;
      }
      .notes-content strong {
        color: var(--text);
        font-weight: 700;
      }

      .formula-box {
        background: var(--surf3);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px 20px;
        font-family: "Courier New", monospace;
        font-size: 1rem;
        color: var(--primary);
        font-weight: 700;
        margin: 12px 0;
        letter-spacing: 0.02em;
      }

      /* ── QUIZ ────────────────────────────────────────────── */
      .quiz-wrap {
        display: grid;
        gap: 20px;
      }
      .quiz-progress-bar {
        height: 6px;
        border-radius: 999px;
        background: var(--border);
        overflow: hidden;
      }
      .quiz-progress-fill {
        height: 100%;
        border-radius: 999px;
        background: var(--primary);
        transition: width 400ms ease;
      }
      .quiz-counter {
        font-size: 0.82rem;
        color: var(--muted);
        font-weight: 600;
        margin-bottom: 4px;
      }

      .question-box {
        background: var(--surf2);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 24px;
        font-size: 1rem;
        font-weight: 600;
        line-height: 1.6;
      }
      .options-grid {
        display: grid;
        gap: 10px;
      }
      .option-btn {
        width: 100%;
        padding: 14px 18px;
        border-radius: 14px;
        border: 1.5px solid var(--border);
        background: var(--surf2);
        color: var(--text);
        font-size: 0.9rem;
        font-weight: 600;
        text-align: left;
        transition:
          background 160ms,
          border-color 160ms,
          transform 120ms;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .option-btn:hover:not(:disabled) {
        background: var(--surf3);
        border-color: var(--primary);
        transform: translateX(3px);
      }
      .option-btn.correct {
        background: rgba(34, 197, 94, 0.12);
        border-color: var(--success);
        color: var(--success);
      }
      .option-btn.wrong {
        background: rgba(239, 68, 68, 0.1);
        border-color: var(--danger);
        color: var(--danger);
      }
      .option-btn:disabled {
        cursor: default;
        transform: none;
      }
      .opt-label {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        flex-shrink: 0;
        background: var(--surface);
        border: 1px solid var(--border);
        display: grid;
        place-items: center;
        font-size: 0.8rem;
        font-weight: 800;
      }
      .quiz-nav {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
      }
      .btn-quiz-nav {
        padding: 12px 22px;
        border-radius: 14px;
        font-size: 0.9rem;
        font-weight: 700;
        background: var(--primary);
        color: #fff;
        box-shadow: 0 4px 14px var(--pri-glow);
        transition:
          opacity 180ms,
          transform 140ms;
        display: none;
      }
      .btn-quiz-nav:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }
      .btn-quiz-nav.visible {
        display: block;
      }

      .quiz-result {
        text-align: center;
        padding: 32px;
        display: grid;
        gap: 16px;
        display: none;
      }
      .quiz-result.show {
        display: grid;
      }
      .result-score {
        font-family: var(--font-d);
        font-size: 3.5rem;
        font-weight: 800;
        color: var(--primary);
        line-height: 1;
      }
      .result-label {
        color: var(--muted);
        font-size: 1rem;
      }
      .result-msg {
        font-size: 1.1rem;
        font-weight: 700;
        margin-top: 4px;
      }
      .btn-retry {
        display: inline-block;
        margin: 0 auto;
        padding: 13px 28px;
        border-radius: 14px;
        background: var(--primary);
        color: #fff;
        font-size: 0.9rem;
        font-weight: 700;
        box-shadow: 0 4px 14px var(--pri-glow);
        transition: opacity 180ms;
        cursor: pointer;
      }
      .btn-retry:hover {
        opacity: 0.9;
      }

      /* ── IMAGES ──────────────────────────────────────────── */
      .img-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 14px;
      }
      .img-card {
        border-radius: 16px;
        overflow: hidden;
        background: var(--surf2);
        border: 1px solid var(--border);
        cursor: pointer;
        transition:
          transform 180ms,
          box-shadow 180ms;
      }
      .img-card:hover {
        transform: scale(1.02);
        box-shadow: 0 10px 28px var(--pri-glow);
      }
      .img-thumb {
        aspect-ratio: 4/3;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3rem;
        background: linear-gradient(135deg, var(--pri-soft), var(--surf3));
      }
      .img-caption {
        padding: 10px 14px;
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--muted);
      }

      /* ── OVERVIEW ────────────────────────────────────────── */
      .overview-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
      }
      .ov-card {
        background: var(--surf2);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px;
        display: flex;
        align-items: flex-start;
        gap: 14px;
        cursor: pointer;
        transition:
          border-color 180ms,
          transform 180ms,
          box-shadow 180ms;
      }
      .ov-card:hover {
        border-color: var(--primary);
        transform: translateY(-2px);
        box-shadow: 0 8px 24px var(--pri-glow);
      }
      .ov-icon {
        width: 44px;
        height: 44px;
        border-radius: 13px;
        background: var(--pri-soft);
        display: grid;
        place-items: center;
        font-size: 1.3rem;
        flex-shrink: 0;
      }
      .ov-name {
        font-weight: 700;
        font-size: 0.95rem;
        margin-bottom: 4px;
      }
      .ov-desc {
        color: var(--muted);
        font-size: 0.82rem;
        line-height: 1.5;
      }
      .ov-count {
        display: inline-block;
        margin-top: 8px;
        padding: 4px 10px;
        border-radius: 999px;
        background: var(--pri-soft);
        color: var(--primary);
        font-size: 0.75rem;
        font-weight: 700;
      }

      /* ── TOAST ───────────────────────────────────────────── */
      .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        padding: 13px 20px;
        border-radius: 14px;
        background: var(--text);
        color: var(--surface);
        font-size: 0.875rem;
        font-weight: 600;
        box-shadow: var(--shadow-lg);
        opacity: 0;
        transform: translateY(10px);
        transition:
          opacity 200ms,
          transform 200ms;
        z-index: 200;
        pointer-events: none;
      }
      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      /* ── RESPONSIVE ──────────────────────────────────────── */
      @media (max-width: 720px) {
        .navbar {
          padding: 0 16px;
        }
        .page {
          padding: 18px 14px 48px;
        }
        .res-grid {
          grid-template-columns: 1fr;
        }
        .overview-grid {
          grid-template-columns: 1fr;
        }
        .img-grid {
          grid-template-columns: repeat(2, 1fr);
        }
        .hero-card {
          padding: 22px;
        }
        .brand span:last-child {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <!-- ── NAVBAR ──────────────────────────────────────────── -->
    <nav class="navbar">
      <div class="nav-left">
        <a href="learner_dashboard.html" class="brand">
          <div class="brand-mark">
            <svg viewBox="0 0 24 24">
              <path d="M12 2L2 7l10 5 10-5-10-5z" />
              <path d="M2 17l10 5 10-5" />
              <path d="M2 12l10 5 10-5" />
            </svg>
          </div>
          <span>Smart Learning DC</span>
        </a>
        <a href="learner_dashboard.html" class="btn-back">← Dashboard</a>
      </div>
      <div class="nav-right">
        <span class="subject-badge"
          ><span class="subject-dot"></span
          ><span id="navSubjectLabel">Subject</span></span
        >
        <button class="btn-icon" id="themeBtn" aria-label="Toggle theme">
          🌙
        </button>
      </div>
    </nav>

    <!-- ── PAGE ────────────────────────────────────────────── -->
    <div class="page">
      <!-- HERO -->
      <div class="hero-card">
        <div class="hero-top">
          <div>
            <div
              style="
                font-size: 0.75rem;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.08em;
                color: var(--muted);
              "
            >
              Subject Resource
            </div>
            <h1 class="hero-title" id="heroTitle">Loading…</h1>
            <p class="hero-sub" id="heroSub">
              Select an action below to explore resources for this subject.
            </p>
          </div>
        </div>
        <!-- Action tabs -->
        <div class="action-tabs" id="actionTabs">

        const d = getData();
        d.subjects = d.subjects || {};
        d.totals = d.totals || { videos: 0, notes: 0, images: 0, quizzes: 0 };
        d.activity = d.activity || [];

        const actionMap = {
          videos: "videos",
          notes: "notes",
          images: "images",
          quizzes: "quizzes",
        };
        const key = actionMap[action];
        if (!key) return;

          videos: 0,
          notes: 0,
          images: 0,
          quizzes: 0,
        };
        d.subjects[subj][key] = (d.subjects[subj][key] || 0) + 1;

          videos: "watched a video",
          notes: "read notes",
          images: "viewed images",
          quizzes: "completed a quiz",

        d.activity.unshift({
          subject: subj,
          action,
          label: labels[key],
          ts: new Date().toISOString(),
        });
        if (d.activity.length > 30) d.activity.length = 30;

        saveData(d);
      }

      let quizState = {};

      function renderQuiz() {
        const questions = getQuiz(subject);
        quizState = {
          questions,
          current: 0,
          answers: Array(questions.length).fill(null),
          score: 0,
          done: false,
        };
        return `
    <div class="card">
      <div class="card-title">Practice Quiz</div>
      <div class="card-heading">${subject} — Test Your Knowledge</div>
      <div class="quiz-wrap" id="quizWrap">
        ${buildQuestion()}
      </div>
    </div>`;
      }

      function buildQuestion() {
        if (quizState.done) return buildResult();
        const q = quizState.questions[quizState.current];
        const idx = quizState.current;
        const total = quizState.questions.length;
        const pct = Math.round((idx / total) * 100);
        const labels = ["A", "B", "C", "D"];
        return `
    <div class="quiz-counter">Question ${idx + 1} of ${total}</div>
    <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
    <div class="question-box">${q.q}</div>
    <div class="options-grid">
      ${q.opts
        .map(
          (opt, i) => `
        <button class="option-btn" id="opt-${i}" onclick="selectOption(${i})">
          <span class="opt-label">${labels[i]}</span>
          ${opt}
        </button>`,
        )
        .join("")}
    </div>
    <div class="quiz-nav">
      <button class="btn-quiz-nav" id="nextBtn">Next →</button>
    </div>`;
      }

      function selectOption(chosen) {
        const q = quizState.questions[quizState.current];
        const correct = q.ans;
        quizState.answers[quizState.current] = chosen;
        if (chosen === correct) quizState.score++;

        // Disable all options and show correct/wrong
        q.opts.forEach((_, i) => {
          const btn = document.getElementById(`opt-${i}`);
          if (!btn) return;
          btn.disabled = true;
          if (i === correct) btn.classList.add("correct");
          else if (i === chosen && i !== correct) btn.classList.add("wrong");
        });

        document.getElementById("nextBtn").classList.add("visible");
      }

      function nextQuestion() {
        quizState.current++;
        if (quizState.current >= quizState.questions.length) {
          quizState.done = true;
          saveQuizScore(subject, quizState.score, quizState.questions.length);
          showToast(
            `Quiz done! Score: ${quizState.score}/${quizState.questions.length}`,
          );
        }
        document.getElementById("quizWrap").innerHTML = buildQuestion();
      }

      function buildResult() {
        const { score, questions } = quizState;
        const pct = Math.round((score / questions.length) * 100);
        const msg =
          pct >= 80
            ? "🎉 Excellent work!"
            : pct >= 60
              ? "👍 Good effort!"
              : "📚 Keep practising!";
        return `
    <div class="quiz-result show">
      <div class="result-score">${pct}%</div>
      <div class="result-label">${score} correct out of ${questions.length} questions</div>
      <div class="result-msg">${msg}</div>
      <button class="btn-retry" onclick="retryQuiz()">🔄 Try again</button>
    </div>`;
      }

      function retryQuiz() {
        document.getElementById("quizWrap").innerHTML = "";
        quizState = {
          ...quizState,
          current: 0,
          answers: Array(quizState.questions.length).fill(null),
          score: 0,
          done: false,
        };
        document.getElementById("quizWrap").innerHTML = buildQuestion();
      }

      function renderImages() {
        const imgs = getImages(subject);
        const tcImages = getTeacherContent("image");
        const viewed = JSON.parse(
          localStorage.getItem(`sl_viewed_images_${subject}`) || "[]",
        );

        const teacherImgs = tcImages
          .map((c, i) => {
            const key = `tc_${i}`;
            const done = viewed.includes(key);
            return `
      <div class="img-card" onclick="viewImage('${subject}','${key}')">
        <div class="img-thumb">🖼️</div>
        <div class="img-caption">
          📤 ${c.title}${done ? " ✓" : ""}
          <div style="font-size:0.7rem;color:var(--success);margin-top:2px;">Teacher upload</div>
        </div>
      </div>`;
          })
          .join("");

        const defaultImgs = imgs
          .map((img, i) => {
            const done = viewed.includes(i);
            return `
      <div class="img-card" onclick="viewImage('${subject}',${i})">
        <div class="img-thumb">${img.icon}</div>
        <div class="img-caption">${img.caption}${done ? " ✓" : ""}</div>
      </div>`;
          })
          .join("");

        return `
    <div class="card">
      <div class="card-title">Visual Library</div>
      <div class="card-heading">${subject} — Diagrams & Visuals</div>
      ${tcImages.length ? `<div style="font-size:0.82rem;color:var(--success);font-weight:600;margin-bottom:8px;">✅ ${tcImages.length} image${tcImages.length > 1 ? "s" : ""} uploaded by your teacher</div>` : ""}
      <div class="img-grid">${teacherImgs}${defaultImgs}</div>
      <p style="color:var(--muted);font-size:0.85rem;margin-top:8px;">Click any image to mark it as viewed and track your progress.</p>
    </div>`;
      }

      /* ── 7. ACTION HANDLERS ────────────────────────────────── */
      function watchVideo(subj, idx) {
        const viewed = JSON.parse(
          localStorage.getItem(`sl_viewed_videos_${subj}`) || "[]",
        );
        if (!viewed.includes(idx)) {
          viewed.push(idx);
          localStorage.setItem(
            `sl_viewed_videos_${subj}`,
            JSON.stringify(viewed),
          );
          trackAction(subj, "videos");
          showToast("Video watched! Progress tracked ✓");
          renderContent();
        } else {
          showToast("Already watched — great revision!");
        }
      }

      function markNoteRead(subj, idx) {
        const read = JSON.parse(
          localStorage.getItem(`sl_read_notes_${subj}`) || "[]",
        );
        if (!read.includes(idx)) {
          read.push(idx);
          localStorage.setItem(`sl_read_notes_${subj}`, JSON.stringify(read));
          trackAction(subj, "notes");
          showToast("Notes marked as read ✓");
          renderContent();
        } else {
          showToast("Already marked as read!");
        }
      }

      function viewImage(subj, idx) {
        const viewed = JSON.parse(
          localStorage.getItem(`sl_viewed_images_${subj}`) || "[]",
        );
        if (!viewed.includes(idx)) {
          viewed.push(idx);
          localStorage.setItem(
            `sl_viewed_images_${subj}`,
            JSON.stringify(viewed),
          );
          trackAction(subj, "images");
          showToast("Image viewed! Progress tracked ✓");
          renderContent();
        } else {
          showToast("Image already viewed!");
        }
      }

      // Expose for quiz inline calls
      window.selectOption = selectOption;
      window.nextQuestion = nextQuestion;
      window.retryQuiz = retryQuiz;
      window.switchTab = switchTab;
      window.watchVideo = watchVideo;
      window.markNoteRead = markNoteRead;
      window.viewImage = viewImage;

      /* ── 8. TAB SWITCHING ──────────────────────────────────── */
      function switchTab(action) {
        currentAction = action;

        // Update URL without reload
        const url = new URL(window.location);
        url.searchParams.set("action", action);
        window.history.replaceState({}, "", url);

        // Update tab buttons
        document.querySelectorAll(".tab-btn").forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.action === action);
        });

        renderContent();
      }

      function renderContent() {
        const area = document.getElementById("contentArea");
        const renderers = {
          overview: renderOverview,
          videos: renderVideos,
          notes: renderNotes,
          quizzes: renderQuiz,
          images: renderImages,
        };
        area.innerHTML = (renderers[currentAction] || renderOverview)();
      }

      /* ── 9. INIT ───────────────────────────────────────────── */
      document.addEventListener("DOMContentLoaded", () => {
        // Set header info
        document.getElementById("heroTitle").textContent = subject;
        document.getElementById("navSubjectLabel").textContent = subject;
        document.getElementById("heroSub").textContent =
          `Explore videos, notes, quizzes, and visuals for ${subject}. All your activity is tracked and shown on your dashboard.`;

        // Set active tab
        document.querySelectorAll(".tab-btn").forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.action === currentAction);
          btn.addEventListener("click", () => switchTab(btn.dataset.action));
        });

        renderContent();
      });
    </script>
  </body>
</html>
